<div class="flex min-h-screen">
  <div class="flex-grow-1 overflow-y-auto bg-gray-950 p-4">
    <div class="flex justify-content-between align-items-center mb-4">
      <h2 class="text-3xl font-bold text-white">Dashboard de Tickets</h2>
      <p-button label="Crear Ticket" icon="pi pi-plus" size="small"></p-button>
    </div>

    <div class="grid mb-6" cdkDropListGroup>
      <div class="col-12 md:col-4">
        <div class="bg-gray-900 border-round p-3 h-full">
          <h3 class="text-center text-gray-400 mb-3 border-bottom-1 border-gray-800 pb-2">Pendiente</h3>
          <div cdkDropList [cdkDropListData]="todo" (cdkDropListDropped)="drop($event)" class="flex flex-column gap-3 min-h-20rem">
            <div *ngFor="let ticket of todo" cdkDrag class="surface-card p-3 border-round shadow-2 cursor-move border-left-3 border-blue-500">
              <div class="font-bold mb-2">{{ ticket.title }} [cite: 27]</div>
              <div class="flex justify-content-between align-items-center">
                <p-tag [value]="ticket.priority" [severity]="getSeverity(ticket.priority)"></p-tag>
                <span class="text-xs text-gray-500">{{ ticket.assignedTo }} [cite: 29]</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="surface-card p-4 border-round shadow-2">
      <h3 class="mb-3">Vista de Lista</h3>
      <p-table [value]="tickets" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template pTemplate="header">
          <tr>
            <th>Título [cite: 54]</th>
            <th>Estado [cite: 55]</th>
            <th>Prioridad [cite: 56]</th>
            <th>Asignado [cite: 56]</th>
            <th>Acciones</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-ticket>
          <tr>
            <td>{{ ticket.title }}</td>
            <td><p-tag [value]="ticket.status" severity="info"></p-tag></td>
            <td><p-tag [value]="ticket.priority" [severity]="getSeverity(ticket.priority)"></p-tag></td>
            <td>{{ ticket.assignedTo }}</td>
            <td><p-button icon="pi pi-pencil" [text]="true"></p-button></td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>
